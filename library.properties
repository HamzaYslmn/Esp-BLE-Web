sentence=ESP32 Web Bluetooth controller — switches, buttons, sliders, timers, with a self-broadcasting widget catalog for the companion PWA.
paragraph=Single-service BLE plumbing for the Web Bluetooth PWA at github.com/HamzaYslmn/Esp-BLE-Web. Per-widget callbacks, self-running FreeRTOS timers, visual separators, and a ping/pong catalog so the central can build its UI without per-device config. No capacity limits — widgets are stored in a std::vector.
